<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icecube Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .sidebar { width: 200px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; background: transparent; color: #8b949e; border: none; text-align: left; cursor: pointer; border-radius: 6px; }
        .nav-btn.active { background: #21262d; color: #fff; }
        .main { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .main.active { display: block; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-edit { background: #1f6feb; width: auto; }
        .btn-del { background: #da3633; width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px;}
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #21262d; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:999; display:flex; justify-content:center; align-items:center; }
        .login-box { background:#161b22; padding:40px; border:1px solid #30363d; width:300px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center">MASTER LOGIN</h2>
            <input id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <input type="password" id="l-token" placeholder="RSA Token">
            <button onclick="doLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="color:#58a6ff; text-align:center">ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('products')">📦 商品</button>
        <button class="nav-btn" onclick="switchTab('users')">👥 用户</button>
        <button class="nav-btn" onclick="switchTab('devices')">📱 设备黑名单</button>
        <button class="nav-btn" onclick="switchTab('chat')">💬 客服</button>
        <button class="nav-btn" style="margin-top:auto; color:red" onclick="AV.User.logOut();location.reload()">退出</button>
    </div>

    <!-- 商品管理 -->
    <div id="tab-products" class="main active">
        <h3>商品发布</h3>
        <div id="edit-form">
            <input type="text" id="p-name" placeholder="名称">
            <input type="number" id="p-price" placeholder="价格">
            <textarea id="p-img" placeholder="图片链接"></textarea>
            <button onclick="handleProduct()">发布/更新</button>
        </div>
        <h4>收款码</h4>
        <div style="display:flex; gap:10px;"><input id="qr-url" placeholder="链接"><button onclick="saveQR()" style="width:100px;">保存</button></div>
        <h4>列表</h4><div id="prod-list"></div>
    </div>

    <!-- 用户管理 -->
    <div id="tab-users" class="main">
        <h3>用户列表</h3>
        <button onclick="loadUsers()" style="width:auto;">刷新</button>
        <table>
            <thead><tr><th>Email</th><th>注册时间</th><th>操作</th></tr></thead>
            <tbody id="user-table-body"></tbody>
        </table>
    </div>

    <!-- 设备黑名单 (新增) -->
    <div id="tab-devices" class="main">
        <h3>📱 被封禁的设备 (Device Blacklist)</h3>
        <button onclick="loadDevices()" style="width:auto;">刷新设备列表</button>
        <table>
            <thead><tr><th>Device ID</th><th>关联账号</th><th>封禁原因</th><th>设备信息</th><th>操作</th></tr></thead>
            <tbody id="device-table-body"></tbody>
        </table>
    </div>

    <!-- 客服 -->
    <div id="tab-chat" class="main">
        <h3>客服中心</h3>
        <div id="chat-list" style="height:400px; overflow-y:auto; border:1px solid #333; padding:10px; margin-bottom:10px;"></div>
        <div style="display:flex; gap:10px;"><input id="reply-txt" placeholder="回复..."><button onclick="sendReply()" style="width:100px;">发送</button></div>
    </div>

    <script>
        const CONFIG = { appId: "SKHyBQH4nGeF6PDB8MVLTMD4-MdYXbMMI", appKey: "kUQ2O1stpz6V8bNhcbk2tkrV", serverURL: "https://skhybqh4.api.lncldglobal.com" };
        AV.init(CONFIG);
        let editingId = null; let currentReplyChannel = null;

        async function doLogin() {
            const e = document.getElementById('l-email').value;
            const p = document.getElementById('l-pass').value;
            const t = document.getElementById('l-token').value;
            try {
                const q = new AV.Query('SecureToken'); const real = await q.first();
                if(!real || real.get('content') !== t) return alert("Token Invalid");
                await AV.User.logIn(e, p);
                document.getElementById('login-overlay').style.display='none';
                initData();
            } catch(err) { alert("Login Failed"); }
        }
        function initData() { loadProducts(); loadQR(); setInterval(loadChat, 3000); }
        function switchTab(t) {
            document.querySelectorAll('.main').forEach(m=>m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t==='users') loadUsers();
            if(t==='devices') loadDevices();
            if(t==='chat') loadChat();
        }

        // === 设备黑名单管理 ===
        async function loadDevices() {
            const tbody = document.getElementById('device-table-body');
            tbody.innerHTML = "Loading...";
            const q = new AV.Query('DeviceBlacklist'); q.descending('createdAt');
            const res = await q.find();
            tbody.innerHTML = "";
            res.forEach(d => {
                const info = d.get('deviceInfo') || "Unknown";
                // 截取 UserAgent 防止太长
                const shortInfo = info.length > 50 ? info.substring(0, 50) + "..." : info;
                tbody.innerHTML += `
                    <tr>
                        <td><span style="color:#58a6ff; font-family:monospace">${d.get('deviceId')}</span></td>
                        <td>${d.get('associatedEmail')}</td>
                        <td style="color:#f85149">${d.get('reason')}</td>
                        <td title="${info}">${shortInfo}</td>
                        <td><button class="btn-edit" onclick="unbanDevice('${d.id}')">解封</button></td>
                    </tr>`;
            });
        }
        async function unbanDevice(id) {
            if(!confirm("解封该设备？该设备将可以重新访问网站。")) return;
            const d = AV.Object.createWithoutData('DeviceBlacklist', id);
            await d.destroy();
            alert("已解封"); loadDevices();
        }

        // === 之前的功能 (简写保持) ===
        async function loadUsers() {
            const q = new AV.Query('_User'); q.descending('createdAt'); const res = await q.find();
            const bq = new AV.Query('Blacklist'); const bres = await bq.find(); const bans = bres.map(b=>b.get('email'));
            const d = document.getElementById('user-table-body'); d.innerHTML = "";
            res.forEach(u => {
                const e = u.getEmail() || u.getUsername(); const isB = bans.includes(e);
                d.innerHTML += `<tr><td>${e}</td><td>${u.createdAt.toLocaleString()}</td><td><button class="btn-del" onclick="toggleBan('${e}', ${isB})">${isB?'解封':'封禁'}</button></td></tr>`;
            });
        }
        async function toggleBan(e, isB) { if(isB){ const q=new AV.Query('Blacklist'); q.equalTo('email',e); const res=await q.find(); await Promise.all(res.map(x=>x.destroy())); } else { const B=AV.Object.extend('Blacklist'); const b=new B(); b.set('email',e); await b.save(); } loadUsers(); }
        
        async function handleProduct() { /* ...同前... */ }
        async function loadProducts() {
            const q = new AV.Query('Product'); q.descending('createdAt'); const res = await q.find();
            document.getElementById('prod-list').innerHTML = res.map(p=>`<div style="padding:10px; border-bottom:1px solid #333;">${p.get('name')} - ¥${p.get('price')} <button class="btn-del" onclick="delP('${p.id}')">删</button></div>`).join('');
        }
        async function delP(id) { const p=AV.Object.createWithoutData('Product', id); await p.destroy(); loadProducts(); }
        async function saveQR() { const u = document.getElementById('qr-url').value; const q = new AV.Query('GlobalConfig'); let c; try { c = await q.first(); } catch(e){} if(!c) { const C = AV.Object.extend('GlobalConfig'); c = new C(); } c.set('paymentQR', u); await c.save(); alert("Saved"); }
        async function loadQR() { const q = new AV.Query('GlobalConfig'); const c = await q.first(); if(c) document.getElementById('qr-url').value = c.get('paymentQR'); }
        
        async function loadChat() {
            const q = new AV.Query('ChatMessage'); q.ascending('createdAt'); q.limit(50); const ms = await q.find();
            document.getElementById('chat-list').innerHTML = ms.map(m=>`<div onclick="setReply('${m.get('channel')}')" style="cursor:pointer; padding:5px; border-bottom:1px solid #222; ${m.get('isAdmin')?'text-align:right; color:#58a6ff':''}"><b>${m.get('senderName')}:</b> ${m.get('content')}</div>`).join('');
        }
        function setReply(c) { currentReplyChannel=c; document.getElementById('reply-txt').placeholder="回复: "+c; }
        async function sendReply() { if(!currentReplyChannel)return alert("点选消息回复"); const t=document.getElementById('reply-txt').value; const C=AV.Object.extend('ChatMessage'); const m=new C(); m.set('content',t); m.set('senderName','Admin'); m.set('isAdmin',true); m.set('channel',currentReplyChannel); await m.save(); document.getElementById('reply-txt').value=""; loadChat(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icecube 商城控制台 (Pro)</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        /* 保持之前的黑客风格，增加了一些新样式 */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: #161b22; padding: 30px; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2, h3 { color: #58a6ff; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background: #2ea043; }
        .secondary { background: #1f6feb; } .secondary:hover { background: #388bfd; }
        .danger { background: #da3633; }
        .section { margin-bottom: 30px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #8b949e; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🛠️ 商城配置中心</h2>
        
        <!-- 1. 收款码配置区 -->
        <div class="section">
            <h3>💰 支付设置</h3>
            <label>收款码图片链接 (微信/支付宝):</label>
            <input type="text" id="qr-code-url" placeholder="粘贴你的收款码图片地址...">
            <button onclick="saveConfig()" class="secondary">💾 保存收款码配置</button>
        </div>

        <!-- 2. 商品发布区 -->
        <div class="section">
            <h3>📦 发布新商品</h3>
            <label>商品名称:</label>
            <input type="text" id="p-name">
            
            <label>价格 (元):</label>
            <input type="number" id="p-price">
            
            <label>图片链接 (支持多张，用英文逗号 , 隔开):</label>
            <textarea id="p-img" rows="3" placeholder="例如: http://a.com/1.jpg, http://a.com/2.jpg"></textarea>
            
            <button onclick="uploadProduct()">🚀 上架商品</button>
        </div>

        <button onclick="AV.User.logOut();location.reload();" class="danger">退出登录</button>
    </div>

    <script>
        // === 配置区 ===
        const CONFIG = {
            appId: "SKHyBQH4nGeF6PDB8MVLTMD4-MdYXbMMI",
            appKey: "kUQ2O1stpz6V8bNhcbk2tkrV",
            serverURL: "https://skhybqh4.api.lncldglobal.com"
        };
        AV.init(CONFIG);

        // 检查登录
        if (!AV.User.current()) {
            // 如果没登录，简单的弹窗输入登录 (简化版，为了代码短一点)
            const email = prompt("请输入管理员邮箱:");
            const pass = prompt("请输入密码:");
            AV.User.logInWithEmail(email, pass).then(() => {
                alert("登录成功");
                loadConfig(); // 登录后加载收款码
            }, (e) => {
                alert("登录失败，请刷新重试");
            });
        } else {
            loadConfig();
        }

        // === 功能 1: 保存收款码 ===
        async function saveConfig() {
            const qrUrl = document.getElementById('qr-code-url').value;
            if(!qrUrl) return alert("请填写收款码链接");

            // 我们用一个叫 GlobalConfig 的表来存这些设置
            const query = new AV.Query('GlobalConfig');
            let config;
            try {
                config = await query.first(); // 尝试找已有的配置
            } catch(e) {}

            if (!config) {
                const ConfigClass = AV.Object.extend('GlobalConfig');
                config = new ConfigClass();
            }
            
            config.set('paymentQR', qrUrl);
            await config.save();
            alert("✅ 收款码已更新！");
        }

        // 加载已有的收款码填入框内
        async function loadConfig() {
            const query = new AV.Query('GlobalConfig');
            const config = await query.first();
            if(config) {
                document.getElementById('qr-code-url').value = config.get('paymentQR');
            }
        }

        // === 功能 2: 发布商品 (支持多图) ===
        function uploadProduct() {
            const name = document.getElementById('p-name').value;
            const price = Number(document.getElementById('p-price').value);
            const imgRaw = document.getElementById('p-img').value;

            if(!name || !price || !imgRaw) return alert("请填写完整");

            // 把逗号分隔的字符串变成数组，并去掉多余空格
            const imgList = imgRaw.split(',').map(url => url.trim()).filter(url => url !== "");

            const Product = AV.Object.extend('Product');
            const p = new Product();
            p.set('name', name);
            p.set('price', price);
            p.set('image', imgList[0]); // 兼容旧版，第一张作为主图
            p.set('images', imgList);   // 新字段，存所有图片
            
            p.save().then(() => {
                alert('上架成功！');
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            }, (err) => alert('失败:' + err.message));
        }
    </script>
</body>
</html>

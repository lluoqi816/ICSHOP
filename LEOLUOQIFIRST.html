<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icecube Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        /* === 保持之前的样式 === */
        body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .sidebar { width: 200px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; background: transparent; color: #8b949e; border: none; text-align: left; cursor: pointer; border-radius: 6px; }
        .nav-btn.active { background: #21262d; color: #fff; }
        .main { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .main.active { display: block; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-edit { background: #1f6feb; width: auto; }
        .btn-del { background: #da3633; width: auto; }
        .edit-mode { border: 2px solid #1f6feb; padding: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #21262d; }
        
        /* 聊天样式 */
        .chat-layout { display: flex; height: 100%; border: 1px solid #30363d; border-radius: 8px; }
        .chat-left { width: 250px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; }
        .chat-right { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        .contact-item { padding: 15px; border-bottom: 1px solid #21262d; cursor: pointer; }
        .contact-item.active { background: #21262d; }
        .contact-public { border-left: 4px solid #58a6ff; }
        .contact-private { border-left: 4px solid #a371f7; }
        .chat-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .chat-bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 0.9rem; word-break: break-all; }
        .bubble-user { background: #21262d; border: 1px solid #30363d; }
        .bubble-admin { background: #1f6feb; color: white; margin-left: auto; }
        .del-msg { color: #da3633; cursor: pointer; font-size: 12px; margin-left: 5px; font-weight: bold; }

        /* 登录层 */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:999; display:flex; justify-content:center; align-items:center; }
        .login-box { background:#161b22; padding:40px; border:1px solid #30363d; width:300px; }
    </style>
</head>
<body>

    <!-- 登录层 (RSA) -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center; color:#58a6ff">MASTER LOGIN</h2>
            <input id="l-email" placeholder="Email" value="lluoqi816@gmail.com">
            <input type="password" id="l-pass" placeholder="Password">
            <input type="password" id="l-token" placeholder="RSA Token (100 chars)">
            <button onclick="doLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <!-- 侧边栏 (新增了 资源文件) -->
    <div class="sidebar">
        <h2 style="color:#58a6ff; text-align:center">ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('orders')">🧾 订单管理</button>
        <button class="nav-btn" onclick="switchTab('chat')">💬 独立客服</button>
        <button class="nav-btn" onclick="switchTab('products')">📦 商品管理</button>
        <button class="nav-btn" onclick="switchTab('files')">📂 资源文件</button> <!-- 新增 -->
        <button class="nav-btn" onclick="switchTab('users')">👥 用户管理</button>
        <button class="nav-btn" onclick="switchTab('notices')">📢 公告发布</button>
        <button class="nav-btn" style="margin-top:auto; color:red" onclick="AV.User.logOut();location.reload()">退出</button>
    </div>

    <!-- 1. 订单管理 -->
    <div id="tab-orders" class="main active">
        <h3>🧾 订单列表</h3><button onclick="loadOrders()" style="width:auto">刷新</button>
        <table><thead><tr><th>时间</th><th>用户</th><th>总价</th><th>状态</th><th>操作</th></tr></thead><tbody id="order-table"></tbody></table>
    </div>

    <!-- 2. 聊天客服 -->
    <div id="tab-chat" class="main" style="padding:0">
        <div class="chat-layout">
            <div class="chat-left" id="contact-list"></div>
            <div class="chat-right">
                <div id="chat-header" style="padding:15px; border-bottom:1px solid #30363d; color:#58a6ff; font-weight:bold">请选择左侧会话</div>
                <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:20px;"></div>
                <div style="padding:15px; background:#161b22; display:flex; gap:10px">
                    <input id="reply-txt" placeholder="回复..." style="margin:0"><button onclick="sendReply()" style="width:100px;">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 商品管理 -->
    <div id="tab-products" class="main">
        <h3>商品发布</h3>
        <div id="edit-form"><input id="p-name" placeholder="名称"><input id="p-price" placeholder="价格"><textarea id="p-img" placeholder="图片链接"></textarea><button onclick="handleProduct()" id="submit-btn">发布</button><button onclick="cancelEdit()" id="cancel-btn" style="display:none;background:#333;margin-top:5px">取消</button></div>
        <div id="prod-list"></div>
        <h4>收款码</h4><div style="display:flex;gap:10px"><input id="qr-url" placeholder="链接"><button onclick="saveQR()" style="width:100px;">保存</button></div>
    </div>

    <!-- 4. 资源文件 (新增板块) -->
    <div id="tab-files" class="main">
        <h3>📂 文件资源管理</h3>
        <div style="background:#161b22; padding:20px; border-radius:8px; border:1px solid #30363d; margin-bottom:20px;">
            <input type="text" id="f-name" placeholder="资源名称 (例如: MyGame.exe)">
            <input type="text" id="f-desc" placeholder="简短描述">
            <input type="file" id="f-file" style="border:none; padding-left:0; color:#8b949e">
            <button onclick="uploadFile()" id="btn-upload" style="background:#1f6feb">☁️ 开始上传</button>
            <p id="upload-status" style="font-size:12px; color:#8b949e; margin-top:10px;"></p>
        </div>
        <h4>已发布资源</h4>
        <div id="file-list"></div>
    </div>

    <!-- 5. 用户管理 -->
    <div id="tab-users" class="main">
        <h3>用户列表</h3><button onclick="loadUsers()" style="width:auto">刷新</button>
        <table><thead><tr><th>Email</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="user-table"></tbody></table>
        <h4 style="margin-top:30px">解除风控</h4><input id="unblock-id" placeholder="Email"><button onclick="liftBan()" style="width:auto">解除</button>
    </div>

    <!-- 6. 公告 -->
    <div id="tab-notices" class="main">
        <h3>公告</h3><textarea id="notice-txt"></textarea><button onclick="postNotice()">发布</button><div id="notice-list"></div>
    </div>

    <script>
        const CONFIG = { appId: "SKHyBQH4nGeF6PDB8MVLTMD4-MdYXbMMI", appKey: "kUQ2O1stpz6V8bNhcbk2tkrV", serverURL: "https://skhybqh4.api.lncldglobal.com" };
        AV.init(CONFIG);

        let currentChannel = null; let chatTimer = null; let editingId = null;

        // === 登录 ===
        async function doLogin() {
            const e=document.getElementById('l-email').value, p=document.getElementById('l-pass').value, t=document.getElementById('l-token').value;
            try {
                const q=new AV.Query('SecureToken'); const r=await q.first(); 
                if(!r || r.get('content')!==t) return alert("❌ Token 错误");
                await AV.User.logIn(e,p); document.getElementById('login-overlay').style.display='none'; initData();
            } catch(err) { alert("登录失败: "+err.message); }
        }
        function initData() { loadOrders(); loadProducts(); loadUsers(); loadNotices(); loadContactList(); loadQR(); loadFiles(); }
        
        function switchTab(t) {
            document.querySelectorAll('.main').forEach(m=>m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t==='chat') { loadContactList(); chatTimer=setInterval(loadChatMsgs, 3000); } else { clearInterval(chatTimer); }
            if(t==='orders') loadOrders(); if(t==='users') loadUsers(); if(t==='notices') loadNotices(); if(t==='files') loadFiles();
        }

        // === 新增：文件上传 ===
        async function uploadFile() {
            const name = document.getElementById('f-name').value;
            const desc = document.getElementById('f-desc').value;
            const fileControl = document.getElementById('f-file');
            if(!name || fileControl.files.length === 0) return alert("请选择文件");
            
            const localFile = fileControl.files[0];
            const avFile = new AV.File(name, localFile);
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('btn-upload');

            btn.disabled = true; btn.innerText = "上传中..."; status.innerText = "⏳ 正在上传...";

            try {
                await avFile.save();
                const SharedFile = AV.Object.extend('SharedFile');
                const sf = new SharedFile();
                sf.set('name', name); sf.set('description', desc); sf.set('url', avFile.url()); sf.set('size', (localFile.size/1024/1024).toFixed(2)+"MB");
                const acl = new AV.ACL(); acl.setPublicReadAccess(true); acl.setWriteAccess(AV.User.current(), true); sf.setACL(acl);
                await sf.save();
                alert("✅ 上传成功"); loadFiles();
                document.getElementById('f-name').value=""; document.getElementById('f-desc').value=""; fileControl.value="";
            } catch(e) { alert("失败: "+e.message); } finally { btn.disabled=false; btn.innerText="☁️ 开始上传"; status.innerText=""; }
        }
        async function loadFiles() {
            const d=document.getElementById('file-list'); d.innerHTML="Loading...";
            const q=new AV.Query('SharedFile'); q.descending('createdAt'); const res=await q.find(); d.innerHTML="";
            res.forEach(f=>{ d.innerHTML+=`<div style="padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><div><b>${f.get('name')}</b> (${f.get('size')})<br><a href="${f.get('url')}" target="_blank" style="color:#58a6ff;font-size:12px">下载链接</a></div><button class="btn-del btn-sm" onclick="delFile('${f.id}')">删</button></div>`; });
        }
        async function delFile(id){ if(confirm("删除?")){ const f=AV.Object.createWithoutData('SharedFile',id); await f.destroy(); loadFiles(); }}

        // === 以下全部为原有逻辑，保持不变 ===
        async function loadOrders(){ const d=document.getElementById('order-table'); d.innerHTML="Loading..."; const q=new AV.Query('Order'); q.descending('createdAt'); const r=await q.find(); d.innerHTML=""; r.forEach(o=>{ const s=o.get('status'); const btn=s==='pending'?`<button class="btn-sm btn-blue" onclick="confirmOrder('${o.id}')">收款</button>`:'✅'; d.innerHTML+=`<tr><td>${o.createdAt.toLocaleString()}</td><td>${o.get('email')}</td><td style="color:#f85149">¥${o.get('total')}</td><td>${s}</td><td>${btn}</td></tr>`; }); }
        async function confirmOrder(id){ if(confirm("收款?")){ const o=AV.Object.createWithoutData('Order',id); o.set('status','paid'); await o.save(); loadOrders(); }}
        
        async function loadContactList(){ const list=document.getElementById('contact-list'); const q=new AV.Query('ChatMessage'); q.descending('createdAt'); q.limit(200); const msgs=await q.find(); const cs=new Set(); cs.add('public'); msgs.forEach(m=>{const c=m.get('channel');if(c&&c!=='public')cs.add(c);}); let html=""; cs.forEach(c=>{const act=c===currentChannel?'active':'';const name=c==='public'?"📢 公共":"🔒 "+c;const cls=c==='public'?'contact-public':'contact-private';html+=`<div class="contact-item ${cls} ${act}" onclick="selectChannel('${c}')"><div style="font-weight:bold;color:white">${name}</div></div>`;}); list.innerHTML=html; }
        function selectChannel(c){ currentChannel=c; document.getElementById('chat-header').innerText=c==='public'?"📢 公共大厅":"🔒 "+c; loadContactList(); loadChatMsgs(); }
        async function loadChatMsgs(){ if(!currentChannel)return; const q=new AV.Query('ChatMessage'); if(currentChannel==='public')q.notEqualTo('isPrivate',true); else q.equalTo('channel',currentChannel); q.ascending('createdAt'); q.limit(50); const ms=await q.find(); const d=document.getElementById('chat-msgs'); d.innerHTML=""; ms.forEach(m=>{ const ia=m.get('isAdmin'); const del=`<span class="del-msg" onclick="delMsg('${m.id}')">🗑️</span>`; d.innerHTML+=`<div class="chat-row" style="flex-direction:${ia?'row-reverse':'row'}"><div class="chat-bubble ${ia?'bubble-admin':'bubble-user'}"><b>${m.get('senderName')}:</b> ${m.get('content')} ${del}</div></div>`; }); }
        async function sendReply(){ if(!currentChannel)return alert("选人"); const t=document.getElementById('reply-txt').value; if(!t)return; const M=AV.Object.extend('ChatMessage'); const m=new M(); m.set('content',t); m.set('senderName','Admin'); m.set('isAdmin',true); m.set('channel',currentChannel); m.set('isPrivate',currentChannel!=='public'); await m.save(); document.getElementById('reply-txt').value=""; loadChatMsgs(); }
        async function delMsg(id){ if(confirm("删?")){ await AV.Object.createWithoutData('ChatMessage',id).destroy(); loadChatMsgs(); }}

        async function handleProduct(){ const n=document.getElementById('p-name').value, p=Number(document.getElementById('p-price').value), i=document.getElementById('p-img').value; if(!n) return; if(editingId) { const P=AV.Object.createWithoutData('Product',editingId); P.set('name',n); P.set('price',p); P.set('image',i); await P.save(); cancelEdit(); } else { const P=AV.Object.extend('Product'); const obj=new P(); obj.set('name',n); obj.set('price',p); obj.set('image',i); await obj.save(); } loadProducts(); }
        async function loadProducts(){ const q=new AV.Query('Product'); q.descending('createdAt'); const r=await q.find(); document.getElementById('prod-list').innerHTML=r.map(p=>`<div style="padding:10px;border-bottom:1px solid #333">${p.get('name')} <button class="btn-sm btn-edit" onclick="startEdit('${p.id}','${p.get('name')}',${p.get('price')},'${p.get('image')}')">改</button> <button class="btn-sm btn-del" onclick="delP('${p.id}')">删</button></div>`).join(''); }
        function startEdit(id,n,p,i){ editingId=id; document.getElementById('p-name').value=n; document.getElementById('p-price').value=p; document.getElementById('p-img').value=i; document.getElementById('submit-btn').innerText="保存"; document.getElementById('cancel-btn').style.display='inline'; }
        function cancelEdit(){ editingId=null; document.getElementById('p-name').value=""; document.getElementById('p-price').value=""; document.getElementById('p-img').value=""; document.getElementById('submit-btn').innerText="发布"; document.getElementById('cancel-btn').style.display='none'; }
        async function delP(id){ if(confirm("删?")){ await AV.Object.createWithoutData('Product',id).destroy(); loadProducts(); }}
        async function saveQR(){ const u=document.getElementById('qr-url').value; const q=new AV.Query('GlobalConfig'); let c; try{c=await q.first()}catch(e){} if(!c){const C=AV.Object.extend('GlobalConfig');c=new C()} c.set('paymentQR',u); await c.save(); alert("Saved"); }
        async function loadQR(){ const q=new AV.Query('GlobalConfig'); const c=await q.first(); if(c)document.getElementById('qr-url').value=c.get('paymentQR'); }
        async function loadUsers(){ const q=new AV.Query('_User'); q.descending('createdAt'); const r=await q.find(); const bq=new AV.Query('Blacklist'); const bres=await bq.find(); const bans=bres.map(b=>b.get('email')); document.getElementById('user-table').innerHTML=r.map(u=>{ const e=u.getEmail()||u.getUsername(); const isB=bans.includes(e); return `<tr><td>${e}</td><td>${u.createdAt.toLocaleString()}</td><td><button class="btn-sm ${isB?'btn-edit':'btn-del'}" onclick="toggleBan('${e}',${isB})">${isB?'解封':'封禁'}</button></td></tr>`}).join(''); }
        async function toggleBan(e,isB){ if(isB){const q=new AV.Query('Blacklist');q.equalTo('email',e);(await q.find()).forEach(x=>x.destroy());}else{const b=new(AV.Object.extend('Blacklist'))();b.set('email',e);await b.save();} loadUsers(); }
        async function liftBan(){ const v=document.getElementById('unblock-id').value; const q=new AV.Query('RegistrationLog'); q.equalTo('email',v); (await q.find()).forEach(x=>x.destroy()); alert("Done"); }
        async function postNotice(){ const t=document.getElementById('notice-txt').value; if(!t)return; const N=AV.Object.extend('Announcement'); const n=new N(); n.set('content',t); const acl=new AV.ACL(); acl.setPublicReadAccess(true); acl.setWriteAccess(AV.User.current(),true); n.setACL(acl); await n.save(); document.getElementById('notice-txt').value=""; loadNotices(); alert("OK"); }
        async function loadNotices(){ const q=new AV.Query('Announcement'); q.descending('createdAt'); const r=await q.find(); document.getElementById('notice-list').innerHTML=r.map(n=>`<div style="padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${n.get('content')}</span><button class="btn-del btn-sm" onclick="delNotice('${n.id}')">删</button></div>`).join(''); }
        async function delNotice(id){ await AV.Object.createWithoutData('Announcement',id).destroy(); loadNotices(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icecube Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        /* 样式复用之前的，增加 Tab 样式 */
        body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .sidebar { width: 200px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; background: transparent; color: #8b949e; border: none; text-align: left; cursor: pointer; border-radius: 6px; }
        .nav-btn.active { background: #21262d; color: #fff; }
        .main { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .main.active { display: block; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-sm { padding: 5px 10px; width: auto; font-size: 12px; margin-right: 5px; }
        .btn-edit { background: #1f6feb; } .btn-del { background: #da3633; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #21262d; }
        
        /* 聊天气泡 */
        .chat-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .chat-bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 0.9rem; word-break: break-all; }
        .bubble-user { background: #21262d; border: 1px solid #30363d; cursor: pointer; }
        .bubble-admin { background: #1f6feb; color: white; margin-left: auto; }
        .del-msg { color: #f85149; cursor: pointer; font-weight: bold; margin-left: 10px; font-size: 12px; }

        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:999; display:flex; justify-content:center; align-items:center; }
        .login-box { background:#161b22; padding:40px; border:1px solid #30363d; width:300px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center">MASTER LOGIN</h2>
            <input id="l-email" placeholder="Email" value="lluoqi816@gmail.com">
            <input type="password" id="l-pass" placeholder="Password">
            <input type="password" id="l-token" placeholder="RSA Token">
            <button onclick="doLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="color:#58a6ff; text-align:center">ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('products')">📦 商品</button>
        <button class="nav-btn" onclick="switchTab('orders')">🧾 订单</button>
        <button class="nav-btn" onclick="switchTab('users')">👥 用户</button>
        <button class="nav-btn" onclick="switchTab('chat')">💬 客服</button>
        <button class="nav-btn" onclick="switchTab('notices')">📢 公告</button>
        <button class="nav-btn" style="margin-top:auto; color:red" onclick="AV.User.logOut();location.reload()">退出</button>
    </div>

    <!-- 商品 -->
    <div id="tab-products" class="main active">
        <h3>商品发布</h3>
        <div id="edit-form"><input id="p-name" placeholder="名称"><input id="p-price" type="number" placeholder="价格"><textarea id="p-img" placeholder="图片链接"></textarea><button onclick="handleProduct()" id="submit-btn">发布</button><button id="cancel-btn" style="background:#333;display:none;margin-top:5px" onclick="cancelEdit()">取消</button></div>
        <h4>列表</h4><div id="prod-list"></div>
        <h4>收款码配置</h4><div style="display:flex; gap:10px;"><input id="qr-url" placeholder="链接"><button onclick="saveQR()" style="width:100px;">保存</button></div>
    </div>

    <!-- 订单 (新增) -->
    <div id="tab-orders" class="main">
        <h3>订单管理</h3>
        <button onclick="loadOrders()" style="width:auto; margin-bottom:10px;">刷新订单</button>
        <table><thead><tr><th>时间</th><th>用户</th><th>商品</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody id="order-table"></tbody></table>
    </div>

    <!-- 公告 (新增) -->
    <div id="tab-notices" class="main">
        <h3>公告发布</h3>
        <textarea id="notice-content" placeholder="输入公告内容..." rows="4"></textarea>
        <button onclick="postNotice()">发布公告</button>
        <h4>历史公告</h4><div id="notice-list"></div>
    </div>

    <!-- 用户 -->
    <div id="tab-users" class="main">
        <h3>用户列表</h3><button onclick="loadUsers()" style="width:auto; margin-bottom:10px;">刷新</button>
        <table><thead><tr><th>Email</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="user-table"></tbody></table>
        <h4 style="margin-top:30px">解除设备/风控</h4><input id="unblock-id" placeholder="DeviceID 或 Email"><button onclick="liftBan()" style="width:auto">解除</button>
    </div>

    <!-- 客服 -->
    <div id="tab-chat" class="main">
        <h3>客服中心</h3><div style="font-size:12px; color:#888; margin-bottom:10px;">点击气泡选择回复对象</div>
        <div id="chat-list" style="height:400px; overflow-y:auto; border:1px solid #333; padding:10px; margin-bottom:10px;"></div>
        <div style="background:#21262d; padding:10px;"><div id="reply-target" style="color:#58a6ff; font-size:12px;">未选择</div><div style="display:flex; gap:10px;"><input id="reply-txt" placeholder="回复..." style="margin:0"><button onclick="sendReply()" style="width:100px;">发送</button></div></div>
    </div>

    <script>
        const CONFIG = { appId: "SKHyBQH4nGeF6PDB8MVLTMD4-MdYXbMMI", appKey: "kUQ2O1stpz6V8bNhcbk2tkrV", serverURL: "https://skhybqh4.api.lncldglobal.com" };
        AV.init(CONFIG);
        let editingId = null; let currentReplyChannel = null;

        async function doLogin() {
            const e=document.getElementById('l-email').value, p=document.getElementById('l-pass').value, t=document.getElementById('l-token').value;
            try {
                const q=new AV.Query('SecureToken'); const r=await q.first(); if(!r||r.get('content')!==t) return alert("Token Invalid");
                await AV.User.logIn(e,p); document.getElementById('login-overlay').style.display='none'; initData();
            } catch(err) { alert("Login Failed"); }
        }
        function initData() { loadProducts(); loadQR(); setInterval(loadChat,3000); }
        function switchTab(t) { document.querySelectorAll('.main').forEach(m=>m.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(t==='users')loadUsers(); if(t==='chat')loadChat(); if(t==='orders')loadOrders(); if(t==='notices')loadNotices(); }

        // === 订单 ===
        async function loadOrders() {
            const d=document.getElementById('order-table'); d.innerHTML="Loading...";
            const q=new AV.Query('Order'); q.descending('createdAt'); const res=await q.find(); d.innerHTML="";
            res.forEach(o => {
                const items = o.get('items').map(i=>`${i.name}x${i.count}`).join(', ');
                const status = o.get('status');
                const u = o.get('email') || "Unknown";
                const action = status==='pending' ? `<button class="btn-sm btn-edit" onclick="confirmOrder('${o.id}')">确认收款</button>` : '✅ 已完成';
                d.innerHTML+=`<tr><td>${o.createdAt.toLocaleString()}</td><td>${u}</td><td>${items}</td><td>¥${o.get('total')}</td><td>${status}</td><td>${action}</td></tr>`;
            });
        }
        async function confirmOrder(id) { if(!confirm("确认收款?"))return; const o=AV.Object.createWithoutData('Order',id); o.set('status','paid'); await o.save(); loadOrders(); }

        // === 公告 ===
        async function postNotice() {
            const t=document.getElementById('notice-content').value; if(!t)return;
            const N=AV.Object.extend('Announcement'); const n=new N(); n.set('content',t); await n.save();
            document.getElementById('notice-content').value=""; loadNotices(); alert("发布成功");
        }
        async function loadNotices() {
            const q=new AV.Query('Announcement'); q.descending('createdAt'); const res=await q.find();
            const d=document.getElementById('notice-list'); d.innerHTML="";
            res.forEach(n => { d.innerHTML+=`<div style="padding:10px; border-bottom:1px solid #333;">${n.get('content')} <button class="btn-sm btn-del" onclick="delNotice('${n.id}')">删</button></div>`; });
        }
        async function delNotice(id) { const n=AV.Object.createWithoutData('Announcement',id); await n.destroy(); loadNotices(); }

        // === 聊天 (含删除) ===
        async function loadChat() {
            const q=new AV.Query('ChatMessage'); q.ascending('createdAt'); q.limit(50); const ms=await q.find();
            const d=document.getElementById('chat-list'); d.innerHTML="";
            ms.forEach(m => {
                const isAdmin=m.get('isAdmin'); const sender=m.get('senderName');
                // 添加了删除按钮
                const delBtn = `<span class="del-msg" onclick="delMsg('${m.id}')">[删除]</span>`;
                if(isAdmin) d.innerHTML+=`<div class="chat-row"><div class="chat-bubble bubble-admin"><b>回复 ${m.get('channel')}:</b> ${m.get('content')} ${delBtn}</div></div>`;
                else d.innerHTML+=`<div class="chat-row"><div class="chat-bubble bubble-user" onclick="setReply('${m.get('channel')}')"><b>${sender}:</b> ${m.get('content')} ${delBtn}</div></div>`;
            });
        }
        async function delMsg(id) { if(!confirm("删?"))return; const m=AV.Object.createWithoutData('ChatMessage',id); await m.destroy(); loadChat(); }
        function setReply(c) { currentReplyChannel=c; document.getElementById('reply-target').innerText="正在回复: "+c; }
        async function sendReply() { if(!currentReplyChannel)return alert("选人"); const t=document.getElementById('reply-txt').value; const C=AV.Object.extend('ChatMessage'); const m=new C(); m.set('content',t); m.set('senderName','Admin'); m.set('isAdmin',true); m.set('channel',currentReplyChannel); await m.save(); document.getElementById('reply-txt').value=""; loadChat(); }

        // === 商品 ===
        async function handleProduct() {
            const n=document.getElementById('p-name').value, pr=Number(document.getElementById('p-price').value), i=document.getElementById('p-img').value;
            if(!n)return; 
            if(editingId) { const p=AV.Object.createWithoutData('Product',editingId); p.set('name',n); p.set('price',pr); p.set('image',i); await p.save(); cancelEdit(); }
            else { const P=AV.Object.extend('Product'); const p=new P(); p.set('name',n); p.set('price',pr); p.set('image',i); await p.save(); }
            loadProducts();
        }
        function startEdit(id,n,p,i) { editingId=id; document.getElementById('p-name').value=n; document.getElementById('p-price').value=p; document.getElementById('p-img').value=i; document.getElementById('submit-btn').innerText="修改"; document.getElementById('cancel-btn').style.display='inline'; }
        function cancelEdit() { editingId=null; document.getElementById('p-name').value=""; document.getElementById('p-price').value=""; document.getElementById('p-img').value=""; document.getElementById('submit-btn').innerText="发布"; document.getElementById('cancel-btn').style.display='none'; }
        async function loadProducts() { const q=new AV.Query('Product'); q.descending('createdAt'); const res=await q.find(); document.getElementById('prod-list').innerHTML=res.map(p=>`<div style="padding:5px;border-bottom:1px solid #333">${p.get('name')} <button class="btn-sm btn-edit" onclick="startEdit('${p.id}','${p.get('name')}',${p.get('price')},'${p.get('image')}')">改</button><button class="btn-sm btn-del" onclick="delP('${p.id}')">删</button></div>`).join(''); }
        async function delP(id){ if(confirm("删?")){ const p=AV.Object.createWithoutData('Product',id); await p.destroy(); loadProducts(); }}
        async function saveQR(){ const u=document.getElementById('qr-url').value; const q=new AV.Query('GlobalConfig'); let c; try{c=await q.first()}catch(e){} if(!c){const C=AV.Object.extend('GlobalConfig');c=new C()} c.set('paymentQR',u); await c.save(); alert("Saved"); }
        async function loadQR(){ const q=new AV.Query('GlobalConfig'); const c=await q.first(); if(c)document.getElementById('qr-url').value=c.get('paymentQR'); }

        // === 用户 ===
        async function loadUsers() { const q=new AV.Query('_User'); q.descending('createdAt'); const res=await q.find(); const bq=new AV.Query('Blacklist'); const bres=await bq.find(); const bans=bres.map(b=>b.get('email')); document.getElementById('user-table').innerHTML=res.map(u=>{const e=u.getEmail()||u.getUsername(); const isB=bans.includes(e); return `<tr style="${isB?'color:red':''}"><td>${e}</td><td>${u.createdAt.toLocaleString()}</td><td><button class="btn-sm ${isB?'btn-edit':'btn-del'}" onclick="toggleBan('${e}',${isB})">${isB?'解封':'封禁'}</button></td></tr>`}).join(''); }
        async function toggleBan(e,isB) { if(isB){const q=new AV.Query('Blacklist');q.equalTo('email',e);const r=await q.find();await Promise.all(r.map(x=>x.destroy()));}else{const B=AV.Object.extend('Blacklist');const b=new B();b.set('email',e);await b.save();} loadUsers(); }
        async function liftBan() { const v=document.getElementById('unblock-id').value; if(v.includes('@')){ const q=new AV.Query('RegistrationLog'); q.equalTo('email',v); (await q.find()).forEach(x=>x.destroy()); } else { const q=new AV.Query('DeviceBlacklist'); q.equalTo('deviceId',v); (await q.find()).forEach(x=>x.destroy()); } alert("Done"); }
    </script>
</body>
</html>

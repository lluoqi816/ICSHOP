<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Icecube Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.12.0/dist/av-min.js"></script>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .sidebar { width: 200px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; background: transparent; color: #8b949e; border: none; text-align: left; cursor: pointer; border-radius: 6px; }
        .nav-btn.active { background: #21262d; color: #fff; }
        .main { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .main.active { display: block; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-edit { background: #1f6feb; width: auto; }
        .btn-del { background: #da3633; width: auto; }
        .edit-mode { border: 2px solid #1f6feb; padding: 10px; border-radius: 8px; }
        /* 聊天气泡 */
        .chat-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .chat-bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 0.9rem; word-break: break-all; }
        .bubble-user { background: #21262d; border: 1px solid #30363d; cursor: pointer; }
        .bubble-user:hover { border-color: #58a6ff; }
        .bubble-admin { background: #1f6feb; color: white; margin-left: auto; }
        .del-msg { color: #da3633; cursor: pointer; font-size: 12px; margin-left: 5px; font-weight: bold; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:999; display:flex; justify-content:center; align-items:center; }
        .login-box { background:#161b22; padding:40px; border:1px solid #30363d; width:300px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="text-align:center">MASTER LOGIN</h2>
            <input id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <input type="password" id="l-token" placeholder="RSA Token">
            <button onclick="doLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="color:#58a6ff; text-align:center">ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('products')">📦 商品</button>
        <button class="nav-btn" onclick="switchTab('users')">👥 用户</button>
        <button class="nav-btn" onclick="switchTab('chat')">💬 客服</button>
        <button class="nav-btn" style="margin-top:auto; color:red" onclick="AV.User.logOut();location.reload()">退出</button>
    </div>

    <!-- 商品管理 -->
    <div id="tab-products" class="main active">
        <h3>商品发布 & 管理</h3>
        <div id="edit-form">
            <input type="text" id="p-name" placeholder="名称">
            <input type="number" id="p-price" placeholder="价格">
            <textarea id="p-img" placeholder="图片链接 (多图用逗号隔开)"></textarea>
            <button id="submit-btn" onclick="handleProduct()">发布商品</button>
            <button id="cancel-btn" onclick="cancelEdit()" style="background:#333; display:none; margin-top:5px;">取消编辑</button>
        </div>
        
        <h4>收款码配置</h4>
        <div style="display:flex; gap:10px;">
            <input id="qr-url" placeholder="收款码链接">
            <button onclick="saveQR()" style="width:100px;">保存</button>
        </div>

        <h4>列表</h4>
        <div id="prod-list"></div>
    </div>

    <!-- 用户管理 -->
    <div id="tab-users" class="main">
        <h3>用户列表</h3>
        <button onclick="loadUsers()" style="width:auto; margin-bottom:10px;">刷新</button>
        <div id="user-list"></div>
        <h4>解除风控</h4>
        <input id="unblock-email" placeholder="邮箱"><button onclick="liftBan()">解除</button>
    </div>

    <!-- 客服 -->
    <div id="tab-chat" class="main">
        <h3>客服中心</h3>
        <div style="margin-bottom:10px; color:#8b949e; font-size:12px;">点击用户的消息即可回复该用户。</div>
        <div id="chat-list" style="height:400px; overflow-y:auto; border:1px solid #333; padding:10px; margin-bottom:10px;"></div>
        
        <div style="background:#21262d; padding:10px; border-radius:6px;">
            <div id="reply-target" style="color:#58a6ff; font-size:12px; margin-bottom:5px;">正在回复: (未选择)</div>
            <div style="display:flex; gap:10px;">
                <input id="reply-txt" placeholder="输入回复内容..." style="margin:0">
                <button onclick="sendReply()" style="width:100px;">发送</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = { appId: "SKHyBQH4nGeF6PDB8MVLTMD4-MdYXbMMI", appKey: "kUQ2O1stpz6V8bNhcbk2tkrV", serverURL: "https://skhybqh4.api.lncldglobal.com" };
        AV.init(CONFIG);

        let editingId = null;
        let currentReplyChannel = null;

        // === 登录 ===
        async function doLogin() {
            const e = document.getElementById('l-email').value;
            const p = document.getElementById('l-pass').value;
            const t = document.getElementById('l-token').value;
            try {
                const q = new AV.Query('SecureToken'); const real = await q.first();
                if(!real || real.get('content') !== t) return alert("Token Invalid");
                await AV.User.logIn(e, p);
                document.getElementById('login-overlay').style.display='none';
                initData();
            } catch(err) { alert("Login Failed"); }
        }

        function initData() { loadProducts(); loadQR(); setInterval(loadChat, 3000); }
        function switchTab(t) {
            document.querySelectorAll('.main').forEach(m=>m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t==='users') loadUsers();
            if(t==='chat') { loadChat(); setTimeout(()=>document.getElementById('chat-list').scrollTop=9999, 500); }
        }

        // === 商品逻辑 ===
        async function handleProduct() {
            const n = document.getElementById('p-name').value;
            const pr = Number(document.getElementById('p-price').value);
            const i = document.getElementById('p-img').value;
            if(!n || !pr || !i) return alert("填写完整");
            try {
                if (editingId) {
                    const p = AV.Object.createWithoutData('Product', editingId);
                    p.set('name', n); p.set('price', pr); p.set('image', i);
                    await p.save(); alert("更新成功"); cancelEdit();
                } else {
                    const P = AV.Object.extend('Product'); const p = new P();
                    p.set('name', n); p.set('price', pr); p.set('image', i);
                    await p.save(); alert("发布成功");
                }
                loadProducts();
            } catch(e) { alert(e.message); }
        }
        async function loadProducts() {
            const q = new AV.Query('Product'); q.descending('createdAt');
            const res = await q.find();
            const d = document.getElementById('prod-list'); d.innerHTML = "";
            res.forEach(p => {
                d.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px; display:flex; justify-content:space-between; align-items:center;"><div><b>${p.get('name')}</b> - ¥${p.get('price')}</div><div><button class="btn-edit" onclick="startEdit('${p.id}', '${p.get('name')}', ${p.get('price')}, '${p.get('image')}')">编辑</button> <button class="btn-del" onclick="delP('${p.id}')">删除</button></div></div>`;
            });
        }
        function startEdit(id, name, price, img) {
            editingId = id; document.getElementById('p-name').value = name; document.getElementById('p-price').value = price; document.getElementById('p-img').value = img;
            document.getElementById('submit-btn').innerText = "💾 保存修改"; document.getElementById('submit-btn').style.background = "#1f6feb";
            document.getElementById('cancel-btn').style.display = "block"; document.getElementById('edit-form').classList.add('edit-mode');
        }
        function cancelEdit() {
            editingId = null; document.getElementById('p-name').value = ""; document.getElementById('p-price').value = ""; document.getElementById('p-img').value = "";
            document.getElementById('submit-btn').innerText = "🚀 发布商品"; document.getElementById('submit-btn').style.background = "#238636";
            document.getElementById('cancel-btn').style.display = "none"; document.getElementById('edit-form').classList.remove('edit-mode');
        }
        async function delP(id) { if(!confirm("删除?")) return; const p = AV.Object.createWithoutData('Product', id); await p.destroy(); loadProducts(); }
        async function saveQR() { const u = document.getElementById('qr-url').value; const q = new AV.Query('GlobalConfig'); let c; try { c = await q.first(); } catch(e){} if(!c) { const C = AV.Object.extend('GlobalConfig'); c = new C(); } c.set('paymentQR', u); await c.save(); alert("Saved"); }
        async function loadQR() { const q = new AV.Query('GlobalConfig'); const c = await q.first(); if(c) document.getElementById('qr-url').value = c.get('paymentQR'); }

        // === 用户管理 ===
        async function loadUsers() {
            const q = new AV.Query('_User'); q.descending('createdAt'); const res = await q.find();
            const bq = new AV.Query('Blacklist'); const bres = await bq.find(); const bans = bres.map(b=>b.get('email'));
            const d = document.getElementById('user-list'); d.innerHTML = "";
            res.forEach(u => {
                const e = u.getEmail() || u.getUsername(); const isB = bans.includes(e);
                d.innerHTML += `<div style="padding:5px; ${isB?'color:red':''}">${e} ${isB?'(封禁)':''} <button class="btn-del" onclick="toggleBan('${e}', ${isB})">${isB?'解封':'封禁'}</button></div>`;
            });
        }
        async function toggleBan(e, isB) { if(isB) { const q = new AV.Query('Blacklist'); q.equalTo('email', e); const res = await q.find(); await Promise.all(res.map(x=>x.destroy())); } else { const B = AV.Object.extend('Blacklist'); const b = new B(); b.set('email', e); await b.save(); } loadUsers(); }
        async function liftBan() { const e = document.getElementById('unblock-email').value; const q = new AV.Query('RegistrationLog'); q.equalTo('email', e); const res = await q.find(); await Promise.all(res.map(x=>x.destroy())); alert("Done"); }

        // === 聊天逻辑 ===
        async function loadChat() {
            const q = new AV.Query('ChatMessage'); q.ascending('createdAt'); q.limit(50);
            const msgs = await q.find();
            const d = document.getElementById('chat-list'); d.innerHTML = "";
            msgs.forEach(m => {
                const isAdmin = m.get('isAdmin'); const sender = m.get('senderName'); const channel = m.get('channel') || sender;
                const txt = m.get('content'); const id = m.id;
                
                if (isAdmin) {
                    d.innerHTML += `<div class="chat-row"><div class="chat-bubble bubble-admin"><b>回复 ${channel}:</b> ${txt} <span class="del-msg" onclick="delMsg('${id}')">X</span></div></div>`;
                } else {
                    d.innerHTML += `<div class="chat-row"><div class="chat-bubble bubble-user" onclick="setReply('${channel}')"><b>${sender}:</b> ${txt} <span class="del-msg" onclick="delMsg('${id}')">X</span></div></div>`;
                }
            });
        }
        
        function setReply(channel) {
            currentReplyChannel = channel;
            document.getElementById('reply-target').innerText = "正在回复: " + channel;
        }

        async function sendReply() {
            if(!currentReplyChannel) return alert("请先点击一条用户消息来选择回复对象");
            const txt = document.getElementById('reply-txt').value; if(!txt) return;
            const Chat = AV.Object.extend('ChatMessage'); const msg = new Chat();
            msg.set('content', txt); msg.set('senderName', 'Admin'); msg.set('isAdmin', true); msg.set('channel', currentReplyChannel);
            await msg.save(); document.getElementById('reply-txt').value = ""; loadChat();
        }

        async function delMsg(id) {
            if(!confirm("删除此消息？")) return;
            const m = AV.Object.createWithoutData('ChatMessage', id);
            await m.destroy(); loadChat();
        }
    </script>
</body>
</html>
